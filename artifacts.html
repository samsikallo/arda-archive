<style>
:root{--ink:#3a3226;--mut:#7a6a50;--line:#b0a58e;--gold:#c9a227}
body{margin:0;color:var(--ink);font:14.5px/1.55 Georgia,'Palatino Linotype',serif;
background:radial-gradient(ellipse at 15% 5%,rgba(255,252,240,.8),rgba(0,0,0,0) 50%),#efe6cd}
#hdr{background:linear-gradient(#221c15,#191512 60%,#12100d);color:#d8c78e;padding:11px 22px 8px;border-bottom:3px double #8a7444;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
#hdr h1{margin:0;font-size:20px;font-variant:small-caps;letter-spacing:.14em;font-weight:normal;color:#e2cf96;text-shadow:0 0 12px rgba(201,162,39,.35)}
#hdr .sub{font-size:10.5px;font-style:italic;color:#a08d5c;flex-basis:100%;margin-top:-2px}
.wrap{max-width:1200px;margin:0 auto;padding:20px 20px 60px}
.cite{color:var(--mut);font-style:italic;font-size:11.5px}
.chips{margin:10px 0}
.chip{display:inline-block;border:1px solid var(--line);border-radius:12px;padding:2px 11px;cursor:pointer;background:#fdfaf2;font-size:12.5px;margin:2px;box-shadow:0 1px 2px rgba(60,40,10,.12)}
.chip.on{background:#efe0bd;border-color:#a8853c;font-weight:bold}
#q{border:1px solid var(--line);border-radius:14px;padding:5px 12px;font:13px Georgia,serif;width:230px;background:#fffdf6}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;margin-top:14px}
.card{background:linear-gradient(#fdfaf2,#f7f0de);border:1px solid var(--line);border-radius:12px;padding:15px 18px;box-shadow:0 3px 10px rgba(60,40,10,.14)}
.card h3{margin:.1em 0 .2em;font-variant:small-caps;font-weight:normal;font-size:19px;color:#5a4626}
.card .ic{font-size:22px;float:right;margin-left:8px}
.cathead{font-variant:small-caps;font-size:19px;letter-spacing:.06em;color:#5a4626;margin:26px 0 2px;
 border-bottom:2px solid var(--line);padding-bottom:3px;display:flex;align-items:baseline;gap:9px}
.cathead .n{font-size:11.5px;font-variant:normal;letter-spacing:0;color:var(--mut);font-style:italic}
.subhead{font-variant:small-caps;font-size:14.5px;letter-spacing:.05em;color:#7a5f2e;margin:16px 0 0;
 display:flex;align-items:baseline;gap:8px}
.subhead::before{content:"❦";color:#c9a227;font-size:11px}
.subhead .n{font-size:10.5px;font-variant:normal;letter-spacing:0;color:var(--mut);font-style:italic}
#none{color:var(--mut);font-style:italic;margin:22px 2px}
.card .plate{float:right;clear:right;width:138px;margin:2px 0 8px 12px;border:1px solid var(--line);border-radius:8px;background:#fdfcf8;box-shadow:0 2px 7px rgba(60,40,10,.16);cursor:zoom-in;display:block}
@media(max-width:560px){.card .plate{float:none;clear:none;width:100%;max-width:240px;margin:6px auto 10px}}
#plight{display:none;position:fixed;inset:0;background:rgba(20,16,10,.86);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:20px;cursor:zoom-out}
#plight img{max-width:min(92vw,620px);max-height:80vh;border:2px solid #8a7444;border-radius:10px;background:#fdfcf8}
#plight .pc{color:#e8dcc0;font-size:13px;font-style:italic;text-align:center;max-width:620px}
.chain{margin-top:.6em;position:relative;padding-left:18px}
.chain::before{content:"";position:absolute;left:5px;top:6px;bottom:6px;width:2px;background:linear-gradient(#c9a227,#8a6a2a)}
.step{position:relative;margin:.45em 0;font-size:12.8px}
.step::before{content:"";position:absolute;left:-17px;top:5px;width:8px;height:8px;border-radius:50%;background:#c9a227;border:1.5px solid #7a5f14}
.step .w{color:var(--mut);font-style:italic;font-size:11px}
.fate{margin-top:.6em;padding:6px 10px;background:#f3ecd8;border-left:3px solid #c9a227;font-size:12.5px;font-style:italic}
.conf{margin-top:.5em;padding:6px 10px;background:#fbe9df;border-left:3px solid #c97a4a;font-size:12px}
.lnk{margin-top:.5em;font-size:12px}
.lnk a{color:#7a4a12}
.orn{text-align:center;color:#b0a58e;margin:.5em 0;font-size:12px;letter-spacing:.3em}

<input id="q" aria-label="search" placeholder="find a treasure…"> <span class="chips" id="chips"></span>
<div id="grid"></div>
<div class="orn" style="margin-top:20px">❦ ✦ ❦</div>
<div class="cite" style="text-align:center">Provenance gaps are stated, never bridged: where six millennia go dark between Gondolin and a troll-hoard, the card says so.</div>
</div>
<script>
const ICON={jewel:"💎",ring:"◯",sword:"🗡",helm:"⛑",stone:"🔮",tree:"🌳",phial:"✨",horn:"📯",mail:"🛡",ram:"🔨",token:"🏹"};
// concept-plate for each treasure (keyed by its name in arda_artifacts.json)
const PLATE={"The Silmarils":"it_silmarils","The One Ring":"it_onering",
"The Three Rings — Narya, Nenya, Vilya":"it_threerings","The Seven and the Nine":"it_sevennine",
"Narsil / Andúril":"it_narsil","The ring of Barahir":"it_barahir","The palantíri":"it_palantir",
"The White Tree line":"it_whitetree","The Arkenstone":"it_arkenstone","Sting":"it_sting",
"Glamdring & Orcrist":"it_glamdring","Anglachel / Gurthang":"it_anglachel",
"The Dragon-helm of Dor-lómin":"it_dragonhelm","The Nauglamír":"it_nauglamir","The Elessar":"it_elessar",
"The Phial of Galadriel":"it_phial","The Horn of the Mark":"it_horn","The mithril-coat":"it_mithril",
"Grond, twice":"it_grond","The Red Arrow & the beacons":"it_redarrow"};
fetch("arda_artifacts.json").then(r=>r.json()).then(D=>{
// categories + labels come from the data (map/gen_artifact_taxonomy.py)
const cats=[];D.forEach(a=>{if(!cats.some(c=>c.k===a.cat))cats.push({k:a.cat,l:a.cl||a.cat})});
const on={};cats.forEach(c=>on[c.k]=1);
const ch=document.getElementById("chips");
cats.forEach(c=>{const s=document.createElement("span");s.className="chip on";
s.textContent=c.l+" ("+D.filter(a=>a.cat===c.k).length+")";
s.onclick=()=>{on[c.k]=!on[c.k];s.classList.toggle("on",on[c.k]);draw()};ch.appendChild(s);});
const nrm=s=>s.normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase();
function card(a){return `<div class="card"><span class="ic">${ICON[a.t]||""}</span><h3>${a.n}</h3>
${PLATE[a.n]?`<img class="plate" src="art/${PLATE[a.n]}.jpg" loading="lazy" alt="concept plate of ${a.n.replace(/"/g,"")}" data-cap="${a.n.replace(/"/g,"")}">`:""}
<div class="cite">${a.o}</div>
<p style="font-size:13px;margin:.4em 0">${a.d}</p>
<div class="chain">${a.ch.map(s=>`<div class="step"><b>${s[0]}</b><br><span class="w">${s[1]} · ${s[2]}</span></div>`).join("")}</div>
<div class="fate">${a.f}</div>
${a.x?`<div class="conf">⚖ ${a.x}</div>`:""}
${a.l.length?`<div class="lnk">${a.l.map(l=>`<a href="${l[0]}">${l[1]} ⧉</a>`).join(" · ")}</div>`:""}
</div>`}
function draw(){
const q=nrm(document.getElementById("q").value||"");
const hit=a=>on[a.cat]&&(!q||nrm(a.n+a.d+a.o+a.sub+a.cl+a.ch.map(s=>s[0]).join(" ")).includes(q));
let h="";
cats.forEach(c=>{
 const inCat=D.filter(a=>a.cat===c.k&&hit(a));
 if(!inCat.length)return;
 h+=`<h2 class="cathead">${c.l}<span class="n">${inCat.length} treasure${inCat.length>1?"s":""}</span></h2>`;
 const subs=[];inCat.forEach(a=>{if(!subs.includes(a.sub))subs.push(a.sub)});
 subs.forEach(s=>{const g=inCat.filter(a=>a.sub===s);
  h+=`<h3 class="subhead">${s}<span class="n">${g.length}</span></h3><div class="grid">`
    +g.map(card).join("")+`</div>`;});
});
document.getElementById("grid").innerHTML=h||`<div id="none">Nothing in the hall answers to that name. ${D.length} treasures in all.</div>`;
// click a plate to enlarge
document.getElementById("grid").querySelectorAll("img.plate").forEach(im=>im.addEventListener("click",e=>{
 e.stopPropagation();
 let L=document.getElementById("plight");
 if(!L){L=document.createElement("div");L.id="plight";document.body.appendChild(L);
  L.addEventListener("click",()=>{L.style.display="none"});
  document.addEventListener("keydown",ev=>{if(ev.key==="Escape")L.style.display="none"});}
 L.innerHTML='<img src="'+im.getAttribute("src")+'" alt="'+im.getAttribute("alt")+'"><div class="pc">'
  +im.dataset.cap+' — an original concept plate drawn for this archive from the corpus’ own description [I]</div>';
 L.style.display="flex";}));}
document.getElementById("q").addEventListener("input",draw);
draw();});
</script>
