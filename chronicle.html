<style>
:root{--ink:#3a3226;--mut:#7a6a50;--line:#b0a58e;--gold:#c9a227}
html,body{margin:0;height:100%;color:var(--ink);font:14px/1.5 Georgia,'Palatino Linotype',serif;background:#efe6cd}
#wrap{display:flex;height:100vh;flex-direction:column}
#hdr{background:linear-gradient(#221c15,#191512 60%,#12100d);color:#d8c78e;padding:9px 22px 7px;border-bottom:3px double #8a7444;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
#hdr h1{margin:0;font-size:19px;font-variant:small-caps;letter-spacing:.14em;font-weight:normal;color:#e2cf96}
#hdr .sub{font-size:10.5px;font-style:italic;color:#a08d5c;flex-basis:100%;margin-top:-2px}
#body{display:flex;flex:1;min-height:0}
#main{flex:1;position:relative;overflow:hidden;background:#0e2a3a}
svg#mv{width:100%;height:100%;display:block}
#panel{width:340px;background:linear-gradient(#fdfaf2,#f6efdc);border-left:2px solid var(--line);padding:14px 16px;overflow-y:auto;font-size:13px}
#panel h2{font-size:22px;margin:.1em 0;font-variant:small-caps;font-weight:normal;color:#5a4626}
#panel h3{font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--mut);margin:.9em 0 .25em;border-bottom:1px solid rgba(176,165,142,.5);padding-bottom:2px}
.cite{color:var(--mut);font-style:italic;font-size:11px}
.ev{margin:.35em 0;padding-left:9px;border-left:3px solid #c9a227;font-size:12.5px}
.ev.past{opacity:.55;border-color:#b0a58e}
#deck{background:rgba(250,246,235,.97);border-top:2px solid var(--line);padding:8px 16px 10px}
#yslider{width:100%;accent-color:#8a6a2a}
#eras{display:flex;font-size:9.5px;letter-spacing:.06em;color:var(--mut);text-transform:uppercase}
.playbtn{font:13px Georgia;padding:4px 14px;border-radius:7px;border:1.5px solid #a8853c;background:#efe0bd;cursor:pointer}
.rlab{font:italic 34px Georgia,serif;paint-order:stroke;stroke:#fdfaf2;stroke-width:4px;opacity:.9;pointer-events:none}
.realm{stroke-width:4;fill-opacity:.14;stroke-opacity:.75;stroke-dasharray:14 8}
#yearbig{font-variant:small-caps;font-size:19px;color:#5a4626;min-width:220px}
.orn{text-align:center;color:#b0a58e;margin:.4em 0;font-size:12px;letter-spacing:.3em}
@media(max-width:820px){#body{flex-direction:column}#panel{width:auto;max-height:34vh;border-left:none;border-top:2px solid var(--line)}}

</div>

<div style="display:flex;align-items:center;gap:14px">
<button class="playbtn" id="play">▶ turn the ages</button>

<input type="range" id="yslider" min="0" max="1000" value="620">
</div>

<script>
const NS="http://www.w3.org/2000/svg",IW=5464,IH=3000;
// piecewise position<->year mapping: [p0,p1,y0,y1,label]
const SEG=[[0,.08,-14400,-30,"Years of the Trees"],[.08,.22,-30,590,"First Age"],[.22,.42,590,4031,"Second Age"],[.42,.93,4031,7052,"Third Age"],[.93,1,7052,7180,"Fourth Age"]];
const p2y=p=>{for(const[a,b,y0,y1]of SEG)if(p<=b+1e-9&&p>=a)return y0+(p-a)/(b-a)*(y1-y0);return 7180};
const y2label=y=>{
if(y<0)return "Y.T. "+Math.round(y/9.582+1500);
if(y<590)return "F.A. "+Math.max(1,Math.round(y));
if(y<4031)return "S.A. "+Math.round(y-590);
if(y<7052)return "T.A. "+Math.round(y-4031);
return "F.o.A. "+Math.round(y-7052)};
// year -> slice index
const SL=[[-14400,0],[-30,1],[455,2],[557,3],[1340,4],[2283,5],[3910,6],[4892,7],[5331,8],[6011,9],[6541,10],[6982,11],[7052,12]];
const y2slice=y=>{let s=0;for(const[yy,i]of SL)if(y>=yy)s=i;return s};
let D=null,C=null,curSlice=-1;
const sv=document.getElementById("mv");
Promise.all(["arda_livingmap.json","arda_chronology.json"].map(u=>fetch(u).then(r=>r.json()))).then(d=>{[D,C]=d;
sv.setAttribute("viewBox","0 300 5464 2700");
sv.innerHTML=`<image href="downloaded_map.jpeg" x="0" y="0" width="${IW}" height="${IH}"/><g id="gR"></g><g id="gJ"></g><text id="bigyear" x="180" y="2870" style="font:italic 150px Georgia;fill:#fdfaf2;paint-order:stroke;stroke:#241f18;stroke-width:16px;opacity:.9"></text>`;
const er=document.getElementById("eras");
er.innerHTML=SEG.map(([a,b,,,l])=>`<span style="flex:${(b-a)*1000};text-align:center;border-left:1px solid #b0a58e">${l}</span>`).join("");
update();});
const RC={elven:"#2a78d6",mannish:"#8a6a2a",numenor:"#4a3aa7",dark:"#c92f1c",dwarven:"#b05a10",hobbit:"#4d7a3c",mixed:"#00694a"};
function drawSlice(si){
const s=D.slices[si];const g=document.getElementById("gR");g.innerHTML="";
if(!s.alive){const p=document.createElementNS(NS,"polygon");
p.setAttribute("points",D.alive.map(q=>q.join(",")).join(" "));
p.setAttribute("style","fill:#123a52;opacity:.28;stroke:none");g.appendChild(p);}
for(const rid of s.realms){const r=D.realms[rid];if(!r)continue;
const col=RC[r.t]||"#666";
const p=document.createElementNS(NS,"polygon");
p.setAttribute("points",r.p.map(q=>q.join(",")).join(" "));
p.setAttribute("class","realm");p.setAttribute("fill",col);p.setAttribute("stroke",col);
g.appendChild(p);
const cx=r.p.reduce((a,q)=>a+q[0],0)/r.p.length,cy=r.p.reduce((a,q)=>a+q[1],0)/r.p.length;
const t=document.createElementNS(NS,"text");t.setAttribute("x",cx);t.setAttribute("y",cy);
t.setAttribute("text-anchor","middle");t.setAttribute("class","rlab");t.setAttribute("fill",col);
t.textContent=r.n.replace(/ \(.*$/,"");g.appendChild(t);}}
function lerpJ(p,dd){if(dd<=p[0].d)return[p[0].x,p[0].y];
for(let i=0;i<p.length-1;i++){const a=p[i],b=p[i+1];
if(dd>=a.d&&dd<=b.d){const f=(b.d===a.d)?1:(dd-a.d)/(b.d-a.d);return[a.x+(b.x-a.x)*f,a.y+(b.y-a.y)*f]}}
const l=p[p.length-1];return[l.x,l.y]}
const STATIC=new Set(["hobbit","tuor","beren","turin"]);
function drawJourneys(y){
const g=document.getElementById("gJ");g.innerHTML="";
if(y<7048.85||y>7050.6)return;
const dd=(y-7048.85)/(7050.6-7048.85)*184;
D.journeys.filter(j=>!STATIC.has(j.id)).forEach(j=>{
const path=document.createElementNS(NS,"path");
path.setAttribute("d","M"+j.p.map(w=>w.x+","+w.y).join(" L"));
path.setAttribute("style",`fill:none;stroke:${j.c};stroke-width:6;opacity:.5;stroke-linecap:round`);
g.appendChild(path);
if(dd>=j.p[0].d-4&&dd<=j.p[j.p.length-1].d+2){
const[x,yy]=lerpJ(j.p,dd);
const m=document.createElementNS(NS,"g");m.setAttribute("transform",`translate(${x},${yy})`);
m.innerHTML=`<circle r="15" fill="${j.c}" stroke="#fdfaf2" stroke-width="4"/>`;
g.appendChild(m);}});}
function update(){
const p=+document.getElementById("yslider").value/1000;
const y=p2y(p);
document.getElementById("yearbig").textContent=y2label(y);
document.getElementById("bigyear").textContent=y2label(y);
const si=y2slice(y);
if(si!=curSlice){curSlice=si;drawSlice(si);}
drawJourneys(y);
const s=D.slices[si];
const near=C.events.filter(e=>e.y<=y).slice(-4).reverse();
const next=C.events.filter(e=>e.y>y).slice(0,3);
document.getElementById("panel").innerHTML=`
<h2>${y2label(y)}</h2><div class="cite">${s.label}</div><div class="orn">❦</div>
<h3>The age about you</h3>${s.ev.map(e=>`<div class="ev" style="border-color:#b0a58e"><span style="font-size:12px">${e[0]}</span><br><span class="cite">${e[1]}</span></div>`).join("")}
${near.length?`<h3>Lately in the Tale of Years</h3>${near.map(e=>`<div class="ev past"><b>${e.t}</b> — ${e.label.slice(0,80)}</div>`).join("")}`:""}
${next.length?`<h3>Yet to come</h3>${next.map(e=>`<div class="ev"><b>${e.t}</b> — ${e.label.slice(0,80)}</div>`).join("")}`:""}
<div class="cite" style="margin-top:.6em">During the War of the Ring the journey-threads ride the map as the year turns.</div>
<h3>Elsewhere</h3><a style="color:#7a4a12" href="arda_timeline.html#y=${Math.round(y)}">this year on the great timeline ⧉</a> · <a style="color:#7a4a12" href="arda_timemap_jpeg.html">the full Living Map ⧉</a>`;}
document.getElementById("yslider").addEventListener("input",update);
let anim=null;
document.getElementById("play").onclick=function(){
if(anim){cancelAnimationFrame(anim);anim=null;this.textContent="▶ turn the ages";return}
this.textContent="❚❚";
const sl=document.getElementById("yslider");
let p=+sl.value>=995?0:+sl.value;
const step=()=>{
const y=p2y(p/1000);
p+=(y>7040&&y<7052)?0.35:1.6;  // slow through the War
if(p>=1000){p=1000;sl.value=p;update();anim=null;document.getElementById("play").textContent="▶ turn the ages";return}
sl.value=p;update();anim=requestAnimationFrame(step);};
anim=requestAnimationFrame(step);};
</script>
