<style>
:root{--ink:#3a3226;--mut:#7a6a50;--line:#b0a58e;--gold:#c9a227}
body{margin:0;color:var(--ink);font:15px/1.6 Georgia,'Palatino Linotype',serif;
background:radial-gradient(ellipse at 15% 5%,rgba(255,252,240,.8),rgba(0,0,0,0) 50%),#efe6cd}
#hdr{background:linear-gradient(#221c15,#191512 60%,#12100d);color:#d8c78e;padding:10px 22px 8px;border-bottom:3px double #8a7444;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
#hdr h1{margin:0;font-size:19px;font-variant:small-caps;letter-spacing:.14em;font-weight:normal;color:#e2cf96}
.wrap{max-width:980px;margin:0 auto;padding:24px 20px 60px}
h2#nm{font-variant:small-caps;font-weight:normal;font-size:32px;letter-spacing:.06em;color:#5a4626;margin:.2em 0 .1em}
h3{font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--mut);margin:1.4em 0 .3em;border-bottom:1px solid rgba(176,165,142,.5);padding-bottom:3px}
.cite{color:var(--mut);font-style:italic;font-size:12px}
.card{background:linear-gradient(#fdfaf2,#f7f0de);border:1px solid var(--line);border-radius:12px;padding:16px 20px;box-shadow:0 3px 10px rgba(60,40,10,.14);margin-top:14px}
a{color:#7a4a12}
.chip{display:inline-block;border:1px solid var(--line);border-radius:12px;padding:1px 10px;background:#fffdf6;font-size:12.5px;margin:2px;text-decoration:none;color:#3a3226}
.ev{margin:.4em 0;padding-left:10px;border-left:3px solid #c9a227}
.orn{text-align:center;color:#b0a58e;margin:.6em 0;font-size:12px;letter-spacing:.3em}
.crown{fill:#c9a227;stroke:#7a5f14;stroke-width:.6}

36.304 C 7.3290622,35.813328 7.2970623,35.301328 7.3610629,34.768 C 7.4037288,34.319996 7.5317287,33.807996 7.7450629,33.232 C 7.9797283,32.677331 8.3743945,32.122665 8.9290629,31.568 L 14.209063,26.32 C 13.057057,24.464006 12.097057,22.938674 11.329063,21.744 C 10.561059,20.549343 9.942393,19.60001 9.4730629,18.896 C 9.0250605,18.192012 8.7050609,17.712012 8.5130629,17.456 C 8.3423946,17.178679 8.2570613,17.040013 8.2570629,17.04 C 8.4063945,16.912013 8.6623942,16.784013 9.0250629,16.656 C 9.3877268,16.50668 9.7823931,16.368014 10.209063,16.24 C 10.635726,16.090681 11.062392,15.962681 11.489063,15.856 C 11.937058,15.728014 12.321057,15.632014 12.641063,15.568 C 12.769057,16.18668 12.961057,16.837346 13.217063,17.52 C 13.494389,18.202678 13.910389,19.056011 14.465063,20.08 C 15.019721,21.104009 15.745054,22.373341 16.641063,23.888 C 17.558385,25.402671 18.710384,27.301336 20.097063,29.584 C 20.971715,28.240002 21.686381,27.00267 22.241063,25.872 C 22.817047,24.741339 23.105046,23.802673 23.105063,23.056 C 23.105046,22.352008 22.955713,21.690675 22.657063,21.072 C 22.358381,20.43201 21.974381,19.88801 21.505063,19.44 C 21.035715,18.970678 20.513049,18.608011 19.937063,18.352 C 19.382384,18.074679 18.849051,17.936012 18.337063,17.936 C 17.590385,17.936012 16.886386,18.202678 16.225063,18.736" style="font-size:32px;font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;text-align:center;line-height:125%;writing-mode:lr-tb;text-anchor:middle;fill:#d8c78e000;fill-opacity:1;stroke:none;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;stroke-opacity:1;font-family:Lucida Grande;-inkscape-font-specification:Lucida Grande" /> </g></svg></span><h1>The Record</h1><span style="flex:1"></span><span><a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="index.html">⌂ the archive</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="arda_timemap_jpeg.html">the living map</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="chronicle.html">the turning ages</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="arda_timeline.html">timeline</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="genealogy.html">family trees</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="artifacts.html">artifacts</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="gallery.html">gallery</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="tours.html">tours</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="poems.html">verse</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="quiz.html">the trial</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="armies_dashboard.html">armies</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="population_dashboard.html">peoples</a> · <a style="color:#c9b06a;text-decoration:none;font-size:11.5px;border-bottom:1px dotted #8a7444" href="languages.html">tongues &amp; letters</a></span></div>
<div class="wrap" id="main"><div class="cite" style="padding:60px 0;text-align:center">Summoning the record…</div></div>
<script>
// In the books — concordance panel
const DOCN={"silm": "The Silmarillion", "hobbit": "The Hobbit", "lotr": "The Lord of the Rings", "ut": "Unfinished Tales", "beren_bl": "Beren and L\u00fathien", "coh": "The Children of H\u00farin", "fog": "The Fall of Gondolin", "fon": "The Fall of N\u00famenor", "nome": "The Nature of Middle-earth", "bolt1": "Lost Tales I", "bolt2": "Lost Tales II", "lays": "The Lays of Beleriand", "shaping": "The Shaping of Middle-earth", "lostroad": "The Lost Road", "rots": "The Return of the Shadow", "treason": "The Treason of Isengard", "wotr_home": "The War of the Ring (HoME)", "sd": "Sauron Defeated", "mr": "Morgoth's Ring", "wj": "The War of the Jewels", "pome": "The Peoples of Middle-earth", "homeindex": "HoME Index", "bombadil": "Tom Bombadil", "poems_coll": "Collected Poems", "atlas": "Atlas (Fonstad)", "guide": "Complete Guide", "companion": "Companion & Guide", "rc": "Reader's Companion"};
function booksPanel(name){
return fetch("arda_concordance.json").then(r=>r.json()).then(CC=>{
const nrmc=s=>s.normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase();
const key=Object.keys(CC).find(k=>nrmc(k)==nrmc(name))||Object.keys(CC).find(k=>nrmc(name).includes(nrmc(k))||nrmc(k).includes(nrmc(name).split(" ")[0]));
if(!key)return "";
const e=CC[key];
const rows=Object.entries(e.d).sort((a,b)=>b[1]-a[1]).slice(0,8);
const mx=rows[0][1];
return `<div class="card"><h3 style="margin-top:.2em">In the books — ${e.n.toLocaleString()} mentions across the corpus</h3>
${rows.map(([d,n])=>`<div style="display:flex;align-items:center;gap:8px;margin:.25em 0;font-size:12.5px">
<span style="width:170px">${DOCN[d]||d}</span>
<span style="flex:1;height:12px;background:linear-gradient(90deg,#c9a227,#8a6a14);border-radius:3px;max-width:${Math.max(3,n/mx*100)}%"></span>
<span class="cite">${n}</span></div>`).join("")}
<div class="cite" style="margin-top:.3em">machine concordance over the full extracted corpus (Phase 2 of the re-ingestion; CORPUS_INDEX.md)</div></div>`;});}

const ALIAS={elwe:"thingol",anarion_g:"anarion",miriel_n:"tarmiriel",pharazon:"arpharazon"};
const RN={A:"Ainur",E:"Elves",M:"Men",H:"Half-elven",D:"Dwarves",B:"Hobbits"};
const RC={A:"#9085e9",E:"#3987e5",M:"#d95926",H:"#4a3aa7",D:"#c98500",B:"#3fa03f"};
const JOUR={frodo:["fellowship","frodo"],sam:["fellowship","frodo"],aragorn:["fellowship","aragorn"],gandalf:["fellowship","gandalf"],
merry:["fellowship","rohirrim"],pippin:["fellowship","gandalf"],boromir:["fellowship"],legolas:["fellowship","aragorn"],gimli:["fellowship","aragorn"],
bilbo:["hobbit"],thorin:["hobbit"],eowyn:["rohirrim"],theoden:["rohirrim"],eomer:["rohirrim"]};
const nrm=s=>s.normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase();
Promise.all(["arda_genealogy.json","arda_chronology.json","arda_armies.json","arda_livingmap.json"].map(u=>fetch(u).then(r=>r.json())))
.then(([G,C,A,M])=>{
const byId={};G.persons.forEach(p=>byId[p.id]=p);
function render(){
const id=(location.hash||"#aragorn").slice(1);
const p=byId[id];
const main=document.getElementById("main");
if(!p){main.innerHTML='<div class="cite" style="padding:60px 0;text-align:center">No record under that name. <a href="genealogy.html">Browse the family trees</a> or <a href="index.html">search the archive</a>.</div>';return}
document.title=p.n+" — the Arda Archive";
const rel={par:[],chi:[],sp:[],sib:[],fos:[],fby:[]};
const parOf={};G.edges.forEach(([t,a,b])=>{if(t=="p"){(parOf[b]=parOf[b]||[]).push(a);}});
G.edges.forEach(([t,a,b,conf])=>{
if(t=="p"&&b==id)rel.par.push(a);
if(t=="p"&&a==id)rel.chi.push(b);
if(t=="m"&&(a==id||b==id))rel.sp.push(a==id?b:a);
if(t=="s"&&(a==id||b==id))rel.sib.push(a==id?b:a);
if(t=="f"&&b==id)rel.fby.push(a);
if(t=="f"&&a==id)rel.fos.push(b);});
(parOf[id]||[]).forEach(pa=>{G.edges.forEach(([t,a,b])=>{if(t=="p"&&a==pa&&b!=id&&!rel.sib.includes(b))rel.sib.push(b);});});
const cid=ALIAS[id]||id;
const life=C.chars.find(x=>x.id==cid);
const evs=C.events.filter(e=>(e.actors||[]).includes(cid));
const nn=nrm(p.n.split(" ")[0]);
const blades=A.blades.filter(b=>nrm(b[2]).includes(nn)||nrm(b[0]).includes(nn));
const places=M.pois.filter(x=>nrm(x.b).includes(nn)).slice(0,6);
const jset=JOUR[id]||[];
const jours=M.journeys.filter(j=>jset.includes(j.id));
const link=i=>byId[i]?`<a class="chip" href="#${i}">${byId[i].n}</a>`:"";
const row=(h,ids)=>ids.length?`<h3>${h}</h3>${ids.map(link).join("")}`:"";
main.innerHTML=`
<div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap">
<h2 id="nm">${ardaSpeakBtn(p.n)} ${p.cr?'<svg width="26" height="18" viewBox="0 0 15 10" style="vertical-align:baseline"><path class="crown" d="M1,9 L2.2,3 L5,6.2 L7.5,1.2 L10,6.2 L12.8,3 L14,9 Z"/></svg> ':""}${p.n}</h2>
<span class="cite" style="font-size:14px">${p.s=="F"?"♀":"♂"} <b style="color:${RC[p.r]||"#666"}">${RN[p.r]||""}</b>${p.h?" · "+p.h:""}${p.rl?" · "+p.rl:""}</span></div>
<div class="cite">${p.b||"?"} — ${p.d||"?"}${p.mn?" · "+p.mn:""}</div>
<div class="orn">❦ ✦ ❦</div>
<div class="card">${row("Parents",rel.par)}${row("Siblings",rel.sib)}${row("Spouse",rel.sp)}${row("Children",rel.chi)}
${row("Fostered",rel.fos)}${row("Foster-parent",rel.fby)}
${p.note?`<h3>Notes</h3>${p.note}`:""}
<h3>Source</h3><span class="cite">${p.cite||"—"}</span></div>`+`<div id="bookspot"></div>`+`
${evs.length?`<div class="card"><h3 style="margin-top:.2em">A life in events — the Chronology</h3>
${evs.map(e=>`<div class="ev"><b>${e.t}</b> — ${e.label} <span class="cite">${e.cite}</span> <a class="cite" href="arda_timeline.html#y=${Math.round(e.y)}">↦ see the year</a></div>`).join("")}</div>`:""}
${jours.length?`<div class="card"><h3 style="margin-top:.2em">Roads walked — the Living Map</h3>
${jours.map(j=>`<div class="ev"><b>${j.n}</b> <span class="cite">${j.note}</span> <a class="cite" href="arda_timemap_jpeg.html#day=${Math.round(j.p[0].d)}">↦ ride it</a></div>`).join("")}</div>`:""}
${blades.length?`<div class="card"><h3 style="margin-top:.2em">Named arms</h3>
${blades.map(b=>`<div class="ev"><b>${b[0]}</b> — ${b[2]} <span class="cite">${b[3]}</span></div>`).join("")}</div>`:""}
${places.length?`<div class="card"><h3 style="margin-top:.2em">Written into the land</h3>
${places.map(x=>`<a class="chip" href="arda_timemap_jpeg.html#place=${x.n.split(" —")[0]}">📍 ${x.n}</a>`).join("")}</div>`:""}
<div class="card"><h3 style="margin-top:.2em">Elsewhere in the archive</h3>
<a class="chip" href="genealogy.html#p=${id}">🌳 in the family trees</a>
${life?`<a class="chip" href="arda_timeline.html#c=${id}">⏳ lifespan on the timeline</a>`:""}
<a class="chip" href="languages.html#name=${encodeURIComponent(p.n.split(" ")[0])}">✒ unweave the name</a>
</div>
<div class="orn">❦</div>
<div class="cite" style="text-align:center">Assembled live from the archive's own datasets — genealogy · chronology · armies · living map. Every line keeps its citation.</div>`;}
function addBooks(nm){const spot=document.getElementById("bookspot");if(!spot)return;
booksPanel(nm).then(html=>{if(html)spot.outerHTML=html;});}
const render0=render;render=function(){render0();const id=(location.hash||"#aragorn").slice(1);const p=byId[id];if(p)addBooks(p.n.split(",")[0].split(" (")[0]);};
addEventListener("hashchange",render);render();
});
</script><script src="speak.js"></script><script src="quotes.js"></script><script src="touch.js"></script><script>if("serviceWorker" in navigator)addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));</script></body></html>
